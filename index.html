let appState = {
    completed: JSON.parse(localStorage.getItem('ejpt_tactical_v2')) || [],
    examMode: false,
    blackBox: false,
    stageFilter: 'all',
    toolFilter: 'all'
};

function init() {
    render();
    setupEvents();
    updateProgress();
}

function render() {
    const list = document.getElementById('methodology-list');
    list.innerHTML = '';
    
    let tasks = [...methodologyData];
    if (appState.blackBox) tasks.sort((a, b) => a.rank - b.rank);
    
    tasks = tasks.filter(t => {
        const stageMatch = appState.stageFilter === 'all' || t.stage === appState.stageFilter;
        const toolMatch = appState.toolFilter === 'all' || t.tool === appState.toolFilter;
        return stageMatch && toolMatch;
    });

    tasks.forEach(task => {
        const isDone = appState.completed.includes(task.id);
        const card = document.createElement('div');
        card.className = `card ${isDone ? 'completed' : ''}`;
        card.id = `card-${task.id}`;
        card.innerHTML = `
            <div class="card-header" onclick="toggleCard('${task.id}')">
                <div style="display:flex; flex-direction:column; gap:5px;">
                    <div>
                        <span class="badge">${task.tool.toUpperCase()}</span>
                        <span style="font-size:12px; color:var(--accent)">Weight: ${task.weight}%</span>
                    </div>
                    <h3 style="margin: 0;">${task.objective}</h3>
                </div>
                <div style="display:flex; align-items:center; gap:15px;">
                    <input type="checkbox" ${isDone ? 'checked' : ''} onclick="event.stopPropagation(); toggleTask('${task.id}')" style="transform: scale(1.4); cursor:pointer;">
                    <span class="expand-indicator">▼</span>
                </div>
            </div>
            <div class="command-section">
                ${task.commands.map(cmd => `
                    <div class="terminal">
                        ${cmd}
                        <button class="copy-btn" onclick="event.stopPropagation(); copyText('${cmd}')">COPY</button>
                    </div>
                `).join('')}
                <div class="intel ${appState.examMode ? 'hidden' : ''}">
                    <strong>Intelligence Layer:</strong> ${task.intel}
                    <div style="color:var(--secondary); margin-top:8px;"><strong>Next Logical Step:</strong> ${task.next}</div>
                </div>
            </div>
        `;
        list.appendChild(card);
    });
}

function toggleCard(id) {
    const card = document.getElementById(`card-${id}`);
    card.classList.toggle('expanded');
}

function toggleTask(id) {
    if (appState.completed.includes(id)) {
        appState.completed = appState.completed.filter(i => i !== id);
    } else {
        appState.completed.push(id);
    }
    localStorage.setItem('ejpt_tactical_v2', JSON.stringify(appState.completed));
    updateProgress();
    render();
}

function updateProgress() {
    const weights = { "Enumeration": 25, "Host & Networking": 25, "Exploitation": 35, "Pivoting": 5, "Post Exploitation": 10 };
    let score = 0;
    Object.keys(weights).forEach(s => {
        const stageTasks = methodologyData.filter(t => t.stage === s);
        const done = stageTasks.filter(t => appState.completed.includes(t.id)).length;
        if (stageTasks.length > 0) score += (done / stageTasks.length) * weights[s];
    });
    const total = Math.min(Math.round(score), 100);
    document.getElementById('total-progress').style.width = total + '%';
    document.getElementById('readiness-pct').innerText = total + '%';
}

function setupEvents() {
    document.getElementById('examMode').onchange = (e) => { appState.examMode = e.target.checked; render(); };
    document.getElementById('blackBox').onchange = (e) => { appState.blackBox = e.target.checked; render(); };
    document.getElementById('toolFilter').onchange = (e) => { appState.toolFilter = e.target.value; render(); };
    document.getElementById('stageBtns').onclick = (e) => {
        if (e.target.tagName === 'BUTTON') {
            document.querySelectorAll('#stageBtns button').forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');
            appState.stageFilter = e.target.dataset.stage;
            render();
        }
    };
}

function copyText(txt) {
    navigator.clipboard.writeText(txt);
}

init();
